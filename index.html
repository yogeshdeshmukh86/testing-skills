<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Suite Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    @keyframes shimmer { from{background-position:-400px 0} to{background-position:400px 0} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-in { animation: fadeIn 0.3s ease both; }
    .slide-in { animation: slideIn 0.3s ease both; }
    .page-transition { animation: fadeIn 0.25s ease both; }
    .skeleton { background: linear-gradient(90deg,#1e293b 25%,#2d3748 50%,#1e293b 75%); background-size:400px 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    .skeleton-light { background: linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%); background-size:400px 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#818cf8); color:#fff; border:none; border-radius:10px; padding:12px 28px; font-size:15px; font-weight:600; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; box-shadow:0 4px 14px rgba(99,102,241,0.3); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(99,102,241,0.4); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-secondary { border-radius:8px; padding:7px 16px; font-size:13px; cursor:pointer; font-weight:500; transition:all 0.15s; }
    .tab-btn { transition:all 0.2s; }
    .expand-arrow { transition:transform 0.2s; }
    textarea:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const PREPOPULATED = `Feature: Journey Planning App

As a user, I want to plan a journey from an origin to a destination so that I can travel efficiently.

Requirements:
1. User can enter an origin and destination (city, address, or postcode)
2. App fetches available routes via a routing API
3. User can select travel mode: driving, walking, cycling, or public transport
4. App displays estimated travel time, distance, and step-by-step directions
5. User can save a journey to their profile (requires login)
6. App shows real-time traffic conditions for driving routes
7. User can set a departure or arrival time
8. App supports multiple route alternatives (fastest, shortest, scenic)
9. User receives notifications for disruptions on saved journeys
10. App works offline with last cached route data`;

    const CATEGORIES = [
      { key: "positive", label: "Positive", icon: "✅", color: "#22c55e", bg: { dark: "#052e16", light: "#f0fdf4" } },
      { key: "negative", label: "Negative", icon: "❌", color: "#ef4444", bg: { dark: "#2d0a0a", light: "#fff5f5" } },
      { key: "performance", label: "Performance", icon: "⚡", color: "#f59e0b", bg: { dark: "#2d1a00", light: "#fffbeb" } },
      { key: "security", label: "Security", icon: "🔒", color: "#818cf8", bg: { dark: "#1a1040", light: "#f5f3ff" } },
      { key: "accessibility", label: "Accessibility", icon: "♿", color: "#22d3ee", bg: { dark: "#0a2030", light: "#ecfeff" } },
    ];

    const STEPS = [
      { label: "Analysing requirements...", icon: "🔍" },
      { label: "Generating positive scenarios...", icon: "✅" },
      { label: "Generating negative scenarios...", icon: "❌" },
      { label: "Generating performance scenarios...", icon: "⚡" },
      { label: "Generating security scenarios...", icon: "🔒" },
      { label: "Generating accessibility scenarios...", icon: "♿" },
      { label: "Preparing state diagram...", icon: "🗺" },
      { label: "Finalising output...", icon: "✨" },
    ];

    const FEATURES = [
      { icon: "🧪", title: "5 Test Categories", desc: "Positive, Negative, Performance, Security & Accessibility" },
      { icon: "🗺", title: "State Diagram", desc: "Mermaid model-based happy path diagram" },
      { icon: "📋", title: "Full Test Cases", desc: "Steps, preconditions & expected results" },
      { icon: "🥒", title: "Gherkin / BDD", desc: "Export any scenario to BDD format" },
      { icon: "📊", title: "Gap Analysis", desc: "AI audits coverage and flags weak spots" },
      { icon: "📤", title: "JIRA & CSV Export", desc: "Ready to export to your test management tool" },
    ];

    function EmptyState({ icon, title, desc, action, onAction, dark }) {
      const tx = dark ? "#e2e8f0" : "#1e293b", mu = dark ? "#64748b" : "#94a3b8";
      return (
        <div className="fade-up" style={{ textAlign: "center", padding: "60px 24px" }}>
          <div style={{ fontSize: 52, marginBottom: 16, animation: "pulse 3s ease-in-out infinite" }}>{icon}</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: tx, marginBottom: 8 }}>{title}</div>
          <div style={{ fontSize: 14, color: mu, marginBottom: 24, maxWidth: 320, margin: "0 auto 24px" }}>{desc}</div>
          {action && <button className="btn-primary" onClick={onAction} style={{ fontSize: 14, padding: "10px 24px" }}>{action}</button>}
        </div>
      );
    }

    function LandingPage({ onStart, dark }) {
      const tx = dark ? "#e2e8f0" : "#1e293b", mu = dark ? "#64748b" : "#94a3b8";
      const bd = dark ? "#1e293b" : "#e2e8f0", card = dark ? "#0f172a" : "#fff";
      return (
        <div className="fade-in">
          <div style={{ textAlign: "center", padding: "48px 16px 40px" }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: dark ? "#1e1a3a" : "#ede9fe", border: "1px solid #6366f1", borderRadius: 99, padding: "4px 14px", fontSize: 12, color: "#818cf8", fontWeight: 600, marginBottom: 20 }}>✨ AI-powered QA tool</div>
            <h1 style={{ fontSize: "clamp(28px,5vw,48px)", fontWeight: 800, color: tx, margin: "0 0 16px", lineHeight: 1.2, letterSpacing: "-1px" }}>
              Generate your entire<br />
              <span style={{ background: "linear-gradient(135deg,#6366f1,#22d3ee)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Test Suite in seconds</span>
            </h1>
            <p style={{ fontSize: "clamp(14px,2vw,17px)", color: mu, maxWidth: 520, margin: "0 auto 32px", lineHeight: 1.7 }}>Paste your feature requirements and instantly get comprehensive test scenarios, detailed test cases, state diagrams and coverage gap analysis.</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button className="btn-primary" onClick={onStart} style={{ fontSize: 16, padding: "14px 36px" }}>🚀 Get Started</button>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: mu }}><span>💡</span> Pre-filled example included</div>
            </div>
            <div style={{ fontSize: 12, color: mu, marginTop: 16 }}>Conceived & designed by <span style={{ color: "#a5b4fc", fontWeight: 600 }}>Yogesh Deshmukh</span></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(min(100%,240px),1fr))", gap: 14, marginBottom: 40 }}>
            {FEATURES.map((f, i) => (
              <div key={i} className="fade-up" style={{ animationDelay: `${i * 0.07}s`, background: card, border: `1px solid ${bd}`, borderRadius: 12, padding: "20px 18px" }}>
                <div style={{ fontSize: 28, marginBottom: 10 }}>{f.icon}</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: tx, marginBottom: 4 }}>{f.title}</div>
                <div style={{ fontSize: 12, color: mu, lineHeight: 1.5 }}>{f.desc}</div>
              </div>
            ))}
          </div>
          <div style={{ background: card, border: `1px solid ${bd}`, borderRadius: 14, padding: "24px 20px" }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: mu, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 16, textAlign: "center" }}>How it works</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
              {["Paste requirements", "Generate scenarios", "Expand test cases", "Analyse coverage", "Export to JIRA / CSV"].map((s, i, arr) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ background: dark ? "#1e293b" : "#f1f5f9", borderRadius: 8, padding: "8px 14px", fontSize: 13, color: tx, fontWeight: 500, whiteSpace: "nowrap" }}><span style={{ color: "#818cf8", marginRight: 6 }}>{i + 1}.</span>{s}</div>
                  {i < arr.length - 1 && <span style={{ color: mu, fontSize: 18 }}>→</span>}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function StateDiagram({ states, transitions, selectedState, onSelectState, dark }) {
      const [svg, setSvg] = useState(""); const [ready, setReady] = useState(false);
      const mu = dark ? "#64748b" : "#94a3b8";
      useEffect(() => {
        if (window.mermaid) { setReady(true); return; }
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js";
        s.onload = () => { window.mermaid.initialize({ startOnLoad: false, theme: dark ? "dark" : "default" }); setReady(true); };
        document.head.appendChild(s);
      }, []);
      useEffect(() => {
        if (!ready || !states?.length) return;
        const idMap = {}; states.forEach(s => { idMap[s.id] = s.label.replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_]/g, ""); });
        const lines = ["stateDiagram-v2", `    [*] --> ${idMap[states[0].id]}`];
        states.forEach(s => lines.push(`    ${idMap[s.id]} : ${s.label}`));
        transitions.forEach(t => { if (idMap[t.from] && idMap[t.to]) lines.push(`    ${idMap[t.from]} --> ${idMap[t.to]} : ${t.label}`); });
        lines.push(`    ${idMap[states[states.length - 1].id]} --> [*]`);
        window.mermaid.render("md-" + Date.now(), lines.join("\n")).then(({ svg: r }) => setSvg(r)).catch(() => setSvg(""));
      }, [ready, states, transitions]);
      if (!states?.length) return null;
      return (
        <div style={{ borderRadius: 10, background: dark ? "#0f172a" : "#f8fafc", border: `1px solid ${dark ? "#1e293b" : "#e2e8f0"}`, padding: 16, overflowX: "auto" }}>
          {svg ? <div className="fade-in" dangerouslySetInnerHTML={{ __html: svg }} style={{ width: "100%", maxWidth: 860 }} />
            : <div style={{ color: "#a5b4fc", fontSize: 13, textAlign: "center", padding: "24px 0", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><div style={{ width: 16, height: 16, border: "2px solid #6366f1", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> Rendering diagram...</div>}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 14, justifyContent: "center" }}>
            {states.map((s, i) => { const isSel = selectedState === s.id, col = i === 0 ? "#22c55e" : i === states.length - 1 ? "#60a5fa" : "#818cf8"; return <button key={s.id} onClick={() => onSelectState(isSel ? null : s.id)} className="tab-btn" style={{ background: isSel ? (dark ? "#1e1a3a" : "#ede9fe") : (dark ? "#1e293b" : "#f1f5f9"), color: isSel ? col : mu, border: `1.5px solid ${isSel ? col : dark ? "#334155" : "#e2e8f0"}`, borderRadius: 99, padding: "4px 14px", fontSize: 12, cursor: "pointer", fontWeight: isSel ? 600 : 400 }}>{i === 0 ? "🟢" : i === states.length - 1 ? "🔵" : "⚪"} {s.label}</button>; })}
          </div>
        </div>
      );
    }

    function GherkinModal({ testCase, onClose, dark }) {
      const [gherkin, setGherkin] = useState(""); const [loading, setLoading] = useState(true);
      const bg = dark ? "#0f172a" : "#fff", bd = dark ? "#1e293b" : "#e2e8f0", tx = dark ? "#e2e8f0" : "#1e293b";
      useEffect(() => { (async () => { try { const res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 400, messages: [{ role: "user", content: `Convert this test scenario to Gherkin BDD format. Return only the Gherkin syntax.\n\nTest scenario: ${testCase}` }] }) }); const data = await res.json(); setGherkin(data.content?.map(c => c.text || "").join("") || ""); } catch { setGherkin("Failed to convert."); } setLoading(false); })(); }, []);
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div className="fade-up" style={{ background: bg, border: `1px solid ${bd}`, borderRadius: 16, padding: 24, maxWidth: 560, width: "100%" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: tx }}>🥒 Gherkin / BDD Format</span>
              <button onClick={onClose} style={{ background: "none", border: "none", color: dark ? "#94a3b8" : "#64748b", fontSize: 22, cursor: "pointer" }}>×</button>
            </div>
            <div style={{ fontSize: 12, color: dark ? "#64748b" : "#94a3b8", marginBottom: 12, fontStyle: "italic", padding: "8px 12px", background: dark ? "#1e293b" : "#f8fafc", borderRadius: 6 }}>{testCase}</div>
            {loading ? <div style={{ color: "#a5b4fc", fontSize: 13, padding: "20px 0", textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><div style={{ width: 14, height: 14, border: "2px solid #6366f1", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> Converting...</div>
              : <><pre style={{ background: dark ? "#020617" : "#f8fafc", border: `1px solid ${bd}`, borderRadius: 8, padding: 14, fontSize: 13, color: dark ? "#a5b4fc" : "#4338ca", overflowX: "auto", whiteSpace: "pre-wrap", fontFamily: "monospace", lineHeight: 1.7 }}>{gherkin}</pre><button onClick={() => navigator.clipboard.writeText(gherkin)} className="btn-primary" style={{ marginTop: 12, fontSize: 13, padding: "7px 16px" }}>Copy Gherkin</button></>}
          </div>
        </div>
      );
    }

    function JiraModal({ results, onClose, dark }) {
      const [copied, setCopied] = useState(false), [tab, setTab] = useState("jira");
      const jiraFormat = CATEGORIES.map(c => `h2. ${c.icon} ${c.label} Test Scenarios\n` + results[c.key].split("\n").filter(l => l.trim()).map(tc => `* ${tc}`).join("\n")).join("\n\n");
      const csvFormat = "Category,Scenario\n" + CATEGORIES.flatMap(c => results[c.key].split("\n").filter(l => l.trim()).map(tc => `"${c.label}","${tc.replace(/"/g, '""')}"`)).join("\n");
      const content = tab === "jira" ? jiraFormat : csvFormat;
      const bg = dark ? "#0f172a" : "#fff", bd = dark ? "#1e293b" : "#e2e8f0", tx = dark ? "#e2e8f0" : "#1e293b", mu = dark ? "#64748b" : "#94a3b8";
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div className="fade-up" style={{ background: bg, border: `1px solid ${bd}`, borderRadius: 16, padding: 24, maxWidth: 640, width: "100%", maxHeight: "85vh", overflow: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: tx }}>📤 Export Test Scenarios</span>
              <button onClick={onClose} style={{ background: "none", border: "none", color: mu, fontSize: 22, cursor: "pointer" }}>×</button>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 14, background: dark ? "#1e293b" : "#f1f5f9", borderRadius: 8, padding: 4 }}>
              {[["jira", "🟦 JIRA Markup"], ["csv", "📊 CSV"]].map(([k, l]) => <button key={k} onClick={() => setTab(k)} style={{ flex: 1, background: tab === k ? (dark ? "#0f172a" : "#fff") : "transparent", color: tab === k ? tx : mu, border: "none", borderRadius: 6, padding: "7px 14px", fontSize: 13, cursor: "pointer", fontWeight: tab === k ? 600 : 400 }}>{l}</button>)}
            </div>
            <pre style={{ background: dark ? "#020617" : "#f8fafc", border: `1px solid ${bd}`, borderRadius: 8, padding: 14, fontSize: 12, color: dark ? "#94a3b8" : "#475569", overflowX: "auto", whiteSpace: "pre-wrap", fontFamily: "monospace", lineHeight: 1.6, maxHeight: 320 }}>{content}</pre>
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button onClick={() => { navigator.clipboard.writeText(content); setCopied(true); setTimeout(() => setCopied(false), 2000); }} className="btn-primary" style={{ fontSize: 13, padding: "7px 16px" }}>{copied ? "✓ Copied!" : "Copy to Clipboard"}</button>
              {tab === "csv" && <button onClick={() => { const a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csvFormat); a.download = "test-scenarios.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }} className="btn-secondary" style={{ background: dark ? "#0f172a" : "#f8fafc", color: "#22c55e", border: "1px solid #22c55e" }}>⬇ Download CSV</button>}
            </div>
          </div>
        </div>
      );
    }

    function TestCaseCard({ scenario, tcId, dark, catColor }) {
      const [expanded, setExpanded] = useState(false), [loading, setLoading] = useState(false), [tc, setTc] = useState(null), [copied, setCopied] = useState(false);
      const bg = dark ? "#0f172a" : "#fff", bd = dark ? "#1e293b" : "#e2e8f0", tx = dark ? "#e2e8f0" : "#1e293b", mu = dark ? "#94a3b8" : "#64748b";
      const expand = async () => {
        if (tc) { setExpanded(!expanded); return; }
        setExpanded(true); setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 600, messages: [{ role: "user", content: `Expand this test scenario into a detailed test case. Return ONLY valid JSON:\n{"preconditions":"string","steps":["step 1","step 2"],"expectedResult":"string","priority":"High"|"Medium"|"Low"}\n\nTest scenario: ${scenario}` }] }) });
          const data = await res.json(); const raw = data.content?.map(c => c.text || "").join("") || "{}";
          setTc(JSON.parse(raw.replace(/```json|```/g, "").trim()));
        } catch { setTc({ preconditions: "N/A", steps: ["Could not generate."], expectedResult: "N/A", priority: "Medium" }); }
        setLoading(false);
      };
      const pCol = { High: "#ef4444", Medium: "#f59e0b", Low: "#22c55e" };
      return (
        <div style={{ background: bg, border: `1px solid ${bd}`, borderRadius: 10, marginBottom: 10, overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", cursor: "pointer" }} onClick={expand}>
            <span style={{ fontSize: 11, fontFamily: "monospace", color: catColor, background: dark ? "#1e293b" : "#f1f5f9", padding: "3px 9px", borderRadius: 6, whiteSpace: "nowrap", fontWeight: 700 }}>{tcId}</span>
            <span style={{ fontSize: 14, color: tx, flex: 1, lineHeight: 1.5 }}>{scenario}</span>
            <span className="expand-arrow" style={{ fontSize: 20, color: mu, transform: expanded ? "rotate(90deg)" : "rotate(0deg)", display: "inline-block" }}>›</span>
          </div>
          {expanded && (
            <div className="slide-in" style={{ borderTop: `1px solid ${bd}`, padding: 16, background: dark ? "#080e1a" : "#f8fafc" }}>
              {loading ? <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{[80,100,60,100].map((w,i) => <div key={i} className={dark?"skeleton":"skeleton-light"} style={{width:`${w}%`,height:16}} />)}</div>
                : tc && (
                  <div className="fade-in" style={{ fontSize: 13, lineHeight: 1.7 }}>
                    <div style={{ marginBottom: 12 }}><span style={{ background: (pCol[tc.priority]||"#f59e0b")+"22", color: pCol[tc.priority]||"#f59e0b", border:`1px solid ${(pCol[tc.priority]||"#f59e0b")}44`, borderRadius:99, padding:"3px 12px", fontSize:12, fontWeight:600 }}>🎯 {tc.priority} Priority</span></div>
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ fontSize:11, fontWeight:700, color:mu, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:6 }}>🔧 Preconditions</div>
                      <div style={{ color:tx, background:bg, border:`1px solid ${bd}`, borderRadius:8, padding:"10px 12px" }}>{tc.preconditions}</div>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))", gap:12, marginBottom:12 }}>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:mu, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:6 }}>📋 Test Steps</div>
                        <div style={{ background:bg, border:`1px solid ${bd}`, borderRadius:8, padding:"10px 12px" }}>
                          {tc.steps.map((s,i) => <div key={i} style={{ display:"flex", gap:10, padding:"5px 0", borderBottom:i<tc.steps.length-1?`1px solid ${bd}`:"none" }}><span style={{ color:catColor, fontWeight:700, minWidth:22 }}>{i+1}.</span><span style={{ color:tx }}>{s}</span></div>)}
                        </div>
                      </div>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:mu, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:6 }}>✅ Expected Result</div>
                        <div style={{ color:"#22c55e", background:dark?"#052e16":"#f0fdf4", border:"1px solid #22c55e44", borderRadius:8, padding:12, lineHeight:1.7 }}>{tc.expectedResult}</div>
                      </div>
                    </div>
                    <button onClick={() => { navigator.clipboard.writeText(`Test Case ID: ${tcId}\nScenario: ${scenario}\nPreconditions: ${tc.preconditions}\nSteps:\n${tc.steps.map((s,i)=>`  ${i+1}. ${s}`).join("\n")}\nExpected Result: ${tc.expectedResult}\nPriority: ${tc.priority}`); setCopied(true); setTimeout(()=>setCopied(false),2000); }} className="btn-secondary" style={{ background:dark?"#1e293b":"#e2e8f0", color:mu, border:`1px solid ${bd}` }}>{copied?"✓ Copied":"Copy Test Case"}</button>
                  </div>
                )}
            </div>
          )}
        </div>
      );
    }

    function CoveragePage({ results, requirement, dark, onGoGenerate }) {
      const [coverage, setCoverage] = useState(null), [loading, setLoading] = useState(false), [generated, setGenerated] = useState(false), [err, setErr] = useState(null);

      const analyse = async () => {

          const [reqs, states] = await Promise.all([
            callApi(`You are a strict QA auditor. Return ONLY a JSON array:\n[{"reqId":"1","requirement":"short text","status":"well"|"weak"|"none","matchedCount":2,"gap":null,"suggestion":null},...]\nRequirements:\n${reqLines.join("\n")}\nScenarios:\n${scenarioText}`,1200),
            callApi(`Return ONLY JSON array:\n[{"state":"Name","status":"well"|"weak"|"none","matchedCount":2,"gap":null},...]\nStates: ${results.states.map(s=>s.label).join(", ")}\nScenarios:\n${scenarioText}`,800)
          ]);
          const r=Array.isArray(reqs)?reqs:[], s=Array.isArray(states)?states:[];

          setCoverage({requirements:r,stateCoverage:s,summary:{wellCount:r.filter(x=>x.status==="well").length,weakCount:r.filter(x=>x.status==="weak").length,noneCount:r.filter(x=>x.status==="none").length,topGap:topGapReq?.gap||(topGapReq?`No coverage for: ${topGapReq.requirement}`:null)}});

${requirement}`;
          const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1800,messages:[{role:"user",content:prompt}]})});
          const data = await res.json(); const txt = data.content?.map(c=>c.text||"").join("\n")||"";

                            <button onClick={()=>setPage("testcases")} className="btn-primary" style={{ fontSize:13, padding:"7px 16px" }}>🧪 Derive Test Cases →</button>
                            <button onClick={()=>setPage("coverage")} className="btn-secondary" style={{ background:d?"#1e293b":"#e2e8f0", color:d?"#94a3b8":"#475569", border:`1px solid ${border}` }}>📊 Coverage →</button>
                            <button onClick={()=>setShowJira(true)} className="btn-secondary" style={{ background:d?"#1e293b":"#e2e8f0", color:d?"#94a3b8":"#475569", border:`1px solid ${border}` }}>📤 Export</button>
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                          {CATEGORIES.map(c=><button key={c.key} onClick={()=>setActiveTab(c.key)} className="tab-btn" style={{ background:activeTab===c.key?c.bg[d?"dark":"light"]:card, color:activeTab===c.key?c.color:muted, border:`1px solid ${activeTab===c.key?c.color:border}`, borderRadius:8, padding:"7px 14px", fontSize:13, cursor:"pointer", fontWeight:activeTab===c.key?600:400 }}>{c.icon} {c.label}</button>)}
                        </div>
                        <div className="slide-in" style={{ background:card, borderRadius:10, padding:16, border:`1px solid ${border}` }}>
                          <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:10 }}>
                            <button onClick={()=>{ navigator.clipboard.writeText(results[activeTab]); setCopied(activeTab); setTimeout(()=>setCopied(null),2000); }} className="btn-secondary" style={{ background:d?"#1e293b":"#e2e8f0", color:muted, border:"none", fontSize:12 }}>{copied===activeTab?"✓ Copied":"Copy All"}</button>
                          </div>
                          {results[activeTab].split("\n").filter(l=>l.trim()).map((line,i)=>(
                            <div key={i} className="fade-up" style={{ animationDelay:`${i*0.03}s`, padding:"10px 0", borderBottom:`1px solid ${border}`, fontSize:14, color:d?"#cbd5e1":"#334155", lineHeight:1.7, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                              <span>{line}</span>
                              {activeTab==="positive"&&<button onClick={()=>setGherkinCase(line)} className="btn-secondary" style={{ flexShrink:0, background:d?"#1e1a3a":"#ede9fe", color:"#818cf8", border:"1px solid #6366f1", fontSize:11, padding:"2px 9px" }}>🥒 Gherkin</button>}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {!results&&!loading&&<div className="fade-up" style={{ marginTop:32, textAlign:"center", padding:"32px 0", color:muted, fontSize:14 }}>👆 Paste your requirements above and hit <strong style={{ color:"#818cf8" }}>Generate Test Suite</strong> to get started</div>}
                  </div>
                )}
                {page==="testcases"&&<TestCasesPage results={results} dark={d} onGoGenerate={()=>setPage("scenarios")} />}
                {page==="coverage"&&<CoveragePage results={results} requirement={requirement} dark={d} onGoGenerate={()=>setPage("scenarios")} />}
              </>
            )}
          </div>

          <div style={{ borderTop:`1px solid ${border}`, padding:16, textAlign:"center", fontSize:12, color:muted }}>
            Conceived & designed by <span style={{ color:"#a5b4fc", fontWeight:600 }}>Yogesh Deshmukh</span> · Powered by Anthropic Claude
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
