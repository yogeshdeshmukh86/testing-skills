<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skills in Testing - Journey Planning Test Strategy</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
    .header { text-align: center; margin-bottom: 40px; }
    .doc-container { border: 1px solid #ddd; border-radius: 8px; padding: 20px; max-height: 80vh; overflow-y: auto; background: #fafafa; }
    .loading { text-align: center; color: #666; }
    .error { color: #d00; }
    button { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #059669; }
    .download { background: #6b7280; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Skills in Testing</h1>
    <p>Test Management & Automation Case Studies</p>
  </div>
  
  <div class="doc-container" id="doc-container">
    <div class="loading">Loading document...</div>
  </div>
  
  <div style="text-align: center; margin-top: 20px;">
    <button onclick="downloadDocx()">Download DOCX</button>
    <a href="journey-planning-test-strategy.docx" class="download" style="display: inline-block; padding: 12px 24px; margin-left: 10px; color: white; text-decoration: none; border-radius: 6px; background: #6b7280;">Raw DOCX</a>
  </div>

  <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script>
    mammoth.convertToHtml({arrayBuffer: await fetch('journey-planning-test-strategy.docx').then(r => r.arrayBuffer())})
      .then(result => {
        document.getElementById('doc-container').innerHTML = result.value;
      })
      .catch(error => {
        document.getElementById('doc-container').innerHTML = '<div class="error">Error loading document: ' + error.message + '</div>';
      });
    
    function downloadDocx() {
      window.location.href = 'journey-planning-test-strategy.docx';
    }
  </script>
</body>
</html>
